version: 2

unit_tests:
# --- TESTE DA STEAM ---
  - name: test_deduplicacao_steam
    model: silver_steam_dedupe
    overrides:
      macros:
        is_incremental: true 
    given:
      - input: ref('stg_steam')
        rows:
          - {steam_game_id: 1, ingested_at_utc: "2026-03-01T10:00:00Z", peak_players: 100}
          - {steam_game_id: 1, ingested_at_utc: "2026-03-01T10:00:00Z", peak_players: 100}
          - {steam_game_id: 1, ingested_at_utc: "2026-03-01T20:00:00Z", peak_players: 100}
      - input: this
        rows:
        - {ingested_at_utc: "1900-01-01 00:00:00"}
    expect:
      rows:
        - {steam_game_id: 1, ingested_at_utc: "2026-03-01T10:00:00Z", peak_players: 100}
        - {steam_game_id: 1, ingested_at_utc: "2026-03-01T20:00:00Z", peak_players: 100}

  # --- TESTE DA TWITCH ---
  - name: test_deduplicacao_twitch
    model: silver_twitch_dedupe
    overrides:
      macros:
        is_incremental: true 
    given:
      - input: ref('stg_twitch')
        rows:
          - {stream_id: 'A1', twitch_game_id: '123', ingested_at_utc: "2026-03-01T10:00:00Z", viewer_count: 50}
          - {stream_id: 'B2', twitch_game_id: '123', ingested_at_utc: "2026-03-01T20:00:00Z", viewer_count: 100}
          - {stream_id: 'A1', twitch_game_id: '123', ingested_at_utc: "2026-03-01T10:00:00Z", viewer_count: 50}
      - input: this
        rows: 
        - {ingested_at_utc: "1900-01-01 00:00:00"}
    expect:
      rows:
        - {twitch_game_id: '123', ingested_at_utc: "2026-03-01T10:00:00Z", viewer_count: 50}
        - {twitch_game_id: '123', ingested_at_utc: "2026-03-01T20:00:00Z", viewer_count: 100}